server.port=8084
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

resilience4j.circuitbreaker.instances.cartCircuitBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.cartCircuitBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.cartCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cartCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.cartCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cartCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.cartCircuitBreaker.sliding-window-type=COUNT_BASED

management.endpoints.web.exposure.include=*
