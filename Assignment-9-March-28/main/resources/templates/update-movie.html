<form th:action="@{/movies/update/{id}(id=${movie.movieId})}" method="post">

    Name: <input type="text" th:value="${movie.movieName}" name="movieName"><br>

    Genre: <input type="text" th:value="${movie.genre}" name="genre"><br>

    Rating: <input type="number" step="0.1" th:value="${movie.rating}" name="rating"><br>

    <button type="submit">Update</button>
</form>
