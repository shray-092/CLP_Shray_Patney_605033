<form action="/movies/save" method="post">
    Name: <input type="text" name="movieName"><br>
    
    Genre:
    <select name="genre">
        <option>Drama</option>
        <option>Fiction</option>
        <option>Satire</option>
    </select><br>

    Rating: <input type="number" step="0.1" name="rating"><br>

    <button type="submit">Add Movie</button>
</form>
